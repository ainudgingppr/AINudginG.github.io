# 基础配置
title: "AINudge-HKTourism"
description: "AI Nudging for Sustainable Tourism Research"
baseurl: "/AINudge-HKTourism"
url: "https://ainudgingppr-spec.github.io"

# 主题配置（GitHub Pages 官方兼容）
remote_theme: "mmistakes/minimal-mistakes@4.26.2"

# 启用侧边栏导航（主题标准格式）
defaults:
  - scope:
      path: ""
    values:
      layout: single
      author_profile: false
      sidebar:
        nav: "main"

# 导航菜单定义
nav:
  main:
    - title: "首頁 / Home"
      url: /
    - title: "關於 / About"
      url: /about/
    - title: "團隊 / Team"
      url: /team/

# 必要依赖配置
markdown: kramdown
highlighter: rouge
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
