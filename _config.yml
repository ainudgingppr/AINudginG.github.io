# ==========================================
# 1. 主题配置（必选，minimal-mistakes 官方主题）
# ==========================================
remote_theme: "mmistakes/minimal-mistakes"

# ==========================================
# 2. 站点基础信息（必选）
# ==========================================
title: "AI-Nudge-HKTourism"
description: "AI Nudging for Sustainable Tourism Research"

# GitHub Pages 部署路径（关键！）
baseurl: "/AI-Nudge-HKTourism"  # 你的仓库名
url: "https://ainudgingppr-spec.github.io"  # 你的 GitHub Pages 域名

# ==========================================
# 3. 导航配置（必选，minimal-mistakes 原生支持）
# ==========================================
sidebar:
  nav: "main"

main:
  - title: "首頁 / Home"
    url: /
  - title: "關於 / About"
    url: /about/
  - title: "團隊 / Team"
    url: /team/

# ==========================================
# 4. 作者信息（可选）
# ==========================================
author:
  name: "AI-Nudge-HKTourism Project"

# ==========================================
# 5. Markdown 解析器（必选）
# ==========================================
markdown: kramdown

# ==========================================
# 6. 插件配置（仅 GitHub Pages 允许的插件）
# ==========================================
plugins:
  - jekyll-feed          # 生成 RSS 订阅（GitHub Pages 支持）
  - jekyll-seo-tag       # SEO 优化（GitHub Pages 支持）
  - jekyll-sitemap       # 生成站点地图（GitHub Pages 支持）

# ==========================================
# 7. 其他必要配置（避免常见错误）
# ==========================================
timezone: Asia/Hong_Kong  # 时区（避免时间显示错误）
encoding: utf-8           # 文件编码（避免中文乱码）
exclude:
  - Gemfile              # 排除不需要的文件
  - Gemfile.lock
  - vendor
include:
  - _pages               # 包含页面文件夹（如 about.md、team.md）
