# 网站基础配置
title: "AINudge-HKTourism"
description: "AI Nudging for Sustainable Tourism Research"
baseurl: "/AINudge-HKTourism"
url: "https://ainudgingppr-spec.github.io"

# 使用老师同款 Minimal Mistakes 主题
remote_theme: "mmistakes/minimal-mistakes"

# 启用侧边栏导航（关键！）
defaults:
  - scope:
      path: ""
    values:
      layout: single
      author_profile: false
      sidebar:
        nav: "main"

# 定义导航菜单（和老师页面结构一致）
sidebars:
  - main:
      - title: "首頁 / Home"
        url: /
      - title: "關於 / About"
        url: /about/
      - title: "團隊 / Team"
        url: /team/

# 其他必要配置
markdown: kramdown
exclude:
  - Gemfile
  - Gemfile.lock
